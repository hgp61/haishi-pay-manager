<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>收银台 - 海狮PAY</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  /* ===== 海狮清新全局滚动条 ===== */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #e0e8f2; }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #6BAEEA, #4A90D9);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #D0E5FA, #6BAEEA); }
  * { scrollbar-width: thin; scrollbar-color: #4A90D9 #e0e8f2; }
  html, body {
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    font-weight: bold;
    background: #eef5fc;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    position: relative;
    overflow-x: hidden;
  }

  /* ===== 海狮清新背景 ===== */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(74,144,217,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(30,100,180,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 10%, rgba(100,180,255,0.06) 0%, transparent 40%);
    animation: bgFlow 15s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes bgFlow {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33%      { transform: translate(-2%, 2%) rotate(1deg); }
    66%      { transform: translate(2%, -1%) rotate(-1deg); }
  }

  /* 流光线条 */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      linear-gradient(105deg, transparent 40%, rgba(74,144,217,0.03) 45%, transparent 50%);
    animation: lightSweep 8s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes lightSweep {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* ===== 主卡片 ===== */
  .cashier-card {
    background: rgba(225,235,245,0.92);
    border-radius: 24px;
    border: 1px solid rgba(74,144,217,0.25);
    box-shadow:
      0 24px 80px rgba(74,144,217,0.22),
      0 0 40px rgba(74,144,217,0.06),
      inset 0 1px 0 rgba(74,144,217,0.1);
    width: 100%;
    max-width: 420px;
    overflow: visible;
    animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    z-index: 1;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    /* 防止卡片高度超出屏幕时被截断 */
    flex-shrink: 0;
  }
  @keyframes cardIn {
    from { opacity:0; transform: translateY(40px) scale(0.96); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  /* 卡片顶部流光线 */
  .cashier-card::before {
    content: '';
    position: absolute;
    top: 0; left: 5%; right: 5%; height: 2px;
    background: linear-gradient(90deg, transparent, #4A90D9, transparent);
    box-shadow: 0 0 12px rgba(74,144,217,0.4);
  }

  /* ===== 顶部品牌区 ===== */
  .merchant-header {
    padding: 28px 28px 20px;
    text-align: center;
    position: relative;
    background: linear-gradient(180deg, rgba(74,144,217,0.08) 0%, transparent 70%);
  }
  /* QR 展示时头部紧凑 */
  .merchant-header.compact {
    padding: 16px 20px 12px;
  }
  .logo-wrap {
    width: 56px; height: 56px;
    margin: 0 auto 12px;
    border-radius: 14px;
    overflow: hidden;
    border: 2px solid rgba(74,144,217,0.35);
    box-shadow: 0 8px 32px rgba(74,144,217,0.2), 0 0 20px rgba(74,144,217,0.08);
    animation: logoFloat 4s ease-in-out infinite;
  }
  .merchant-header.compact .logo-wrap {
    width: 36px; height: 36px;
    margin-bottom: 6px;
    border-radius: 10px;
  }
  .merchant-header.compact .brand-name {
    font-size: 17px;
    letter-spacing: 3px;
  }
  .merchant-header.compact .merchant-desc {
    font-size: 11px;
  }
  @keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }
  .logo-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .brand-name {
    font-size: 22px; font-weight: 800;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #6BAEEA 0%, #4A90D9 35%, #2E78C8 65%, #6BAEEA 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
    text-shadow: none;
  }
  .merchant-desc {
    font-size: 12px;
    color: rgba(74,144,217,0.6);
    letter-spacing: 2px;
  }
  /* ===== 输入区域 ===== */
  .amount-section {
    padding: 24px 24px 16px;
    text-align: center;
  }
  .amount-label {
    font-size: 13px; color: rgba(74,144,217,0.55);
    margin-bottom: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .amount-input-wrap {
    display: flex; align-items: baseline;
    justify-content: center;
    gap: 2px;
    margin-bottom: 16px;
    position: relative;
  }
  .amount-yen {
    font-size: 36px; font-weight: 700;
    background: linear-gradient(135deg, #4A90D9, #6BAEEA);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .amount-input {
    border: none; outline: none;
    font-size: 46px; font-weight: 800;
    width: 220px;
    text-align: center;
    background: transparent;
    border-bottom: 2px solid rgba(74,144,217,0.25);
    transition: all 0.3s;
    font-family: inherit;
    color: #6BAEEA;
    padding-right: 38px;
    padding-bottom: 4px;
  }
  .amount-input:focus {
    border-bottom-color: #4A90D9;
    box-shadow: 0 4px 16px rgba(74,144,217,0.12);
  }
  .amount-input::placeholder {
    color: rgba(74,144,217,0.25);
    font-weight: 700;
  }
  .amount-input::-webkit-outer-spin-button,
  .amount-input::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .amount-input[type=number] { -moz-appearance: textfield; }

  /* 金额步进器 */
  .amount-stepper {
    display: flex; flex-direction: column;
    position: absolute; right: 6px; top: 50%;
    transform: translateY(-50%);
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid rgba(74,144,217,0.12);
    background: rgba(225,235,245,0.8);
  }
  .amount-stepper button {
    width: 24px; height: 18px;
    border: none; outline: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    user-select: none;
    -webkit-user-select: none;
    background: transparent;
  }
  .amount-stepper button:hover {
    background: rgba(74,144,217,0.15);
  }
  .amount-stepper button:active {
    background: rgba(74,144,217,0.25);
  }
  .amount-stepper .step-up {
    border-bottom: 1px solid rgba(74,144,217,0.08);
  }
  .amount-stepper svg {
    width: 10px; height: 10px;
    stroke: #4A90D9;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ===== 支付按钮 ===== */
  .pay-section {
    padding: 16px 24px 28px;
  }
  .pay-btn {
    width: 100%;
    background: linear-gradient(135deg, #4A90D9 0%, #2E78C8 50%, #4A90D9 100%);
    background-size: 200% 100%;
    color: #eef5fc;
    border: none;
    border-radius: 14px;
    padding: 17px;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.4s ease;
    font-family: inherit;
    letter-spacing: 2px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(74,144,217,0.25);
  }
  .pay-btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(74,144,217,0.3), transparent);
    transition: left 0.5s;
  }
  .pay-btn:hover {
    background-position: 100% 0;
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(74,144,217,0.35);
  }
  .pay-btn:hover::after { left: 100%; }
  .pay-btn:active { transform: translateY(0); }
  .pay-btn:disabled {
    opacity: 0.5; cursor: not-allowed;
    transform: none !important; box-shadow: none !important;
  }
  .pay-btn:disabled::after { display: none; }

  .pay-hint {
    text-align:center;font-size:11px;color:rgba(74,144,217,0.35);margin-top:12px;
    letter-spacing: 0.5px;
  }

  /* ===== 二维码区域 ===== */
  .qr-section {
    padding: 12px 24px 20px;
    text-align: center;
    display: none;
  }
  .qr-section.show { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .qr-title {
    font-size: 17px; font-weight: 700;
    background: linear-gradient(135deg, #6BAEEA, #4A90D9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 2px;
    letter-spacing: 1px;
  }
  .qr-subtitle {
    font-size: 12px; color: rgba(74,144,217,0.45);
    margin-bottom: 16px;
  }
  .qr-box {
    background: rgba(58,90,122,0.97);
    border: 2px solid rgba(74,144,217,0.3);
    border-radius: 20px;
    padding: 16px;
    display: inline-block;
    margin-bottom: 10px;
    box-shadow: 0 8px 32px rgba(74,144,217,0.1), 0 0 20px rgba(74,144,217,0.08);
    position: relative;
  }
  .qr-img {
    display: block;
    width: 210px; height: 210px;
    border-radius: 10px;
  }
  .qr-amount {
    font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, #6BAEEA, #4A90D9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 8px 0 2px;
  }
  .qr-subject {
    font-size: 13px; color: rgba(74,144,217,0.6);
    margin-bottom: 10px;
  }
  .qr-tip {
    font-size: 13px;
    color: rgba(74,144,217,0.6);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 8px 16px;
    border-radius: 10px;
    background: rgba(74,144,217,0.06);
    max-width: 260px;
    margin: 0 auto 10px;
  }
  .qr-tip .dot {
    width: 8px; height: 8px;
    background: #4A90D9;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
    box-shadow: 0 0 8px rgba(74,144,217,0.5);
  }
  @keyframes pulse {
    0%, 100% { opacity:1; transform: scale(1); }
    50%       { opacity:0.4; transform: scale(0.8); }
  }
  .qr-tip.paid {
    color: #52c41a;
    background: rgba(82,196,26,0.08);
    border: 1px solid rgba(82,196,26,0.15);
  }
  .qr-tip.paid .dot {
    background: #52c41a;
    animation: none;
    box-shadow: 0 0 8px rgba(82,196,26,0.4);
  }

  .download-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(74,144,217,0.1);
    border: 1px solid rgba(74,144,217,0.25);
    border-radius: 10px;
    padding: 10px 22px;
    font-size: 13px; font-weight: 600;
    color: #4A90D9;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
    margin-right: 8px;
  }
  .download-btn:hover {
    background: rgba(74,144,217,0.18);
    border-color: rgba(74,144,217,0.4);
    transform: translateY(-1px);
  }
  .download-btn svg {
    width: 16px; height: 16px; flex-shrink: 0;
  }

  .cancel-btn {
    display: inline-flex; align-items: center;
    background: transparent; border: 1px solid rgba(74,144,217,0.12);
    border-radius: 10px;
    padding: 10px 22px;
    font-size: 13px; color: rgba(58,90,122,0.4);
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
  }
  .cancel-btn:hover {
    border-color: rgba(74,144,217,0.25); color: rgba(58,90,122,0.65);
  }

  .btn-group {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-top: 4px;
  }

  /* ===== 成功动画 ===== */
  .success-section {
    padding: 44px 24px;
    text-align: center;
    display: none;
  }
  .success-section.show { display: block; animation: successIn 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes successIn {
    from { opacity:0; transform: scale(0.9); }
    to   { opacity:1; transform: scale(1); }
  }
  .success-icon {
    width: 84px; height: 84px;
    background: linear-gradient(135deg, #4A90D9, #2E78C8);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 22px;
    animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 8px 32px rgba(74,144,217,0.3), 0 0 20px rgba(74,144,217,0.1);
  }
  .success-icon svg {
    width: 42px; height: 42px;
  }
  @keyframes popIn {
    0%   { transform: scale(0); opacity:0; }
    60%  { transform: scale(1.2); }
    100% { transform: scale(1); opacity:1; }
  }
  .success-title {
    font-size: 22px; font-weight: 800;
    background: linear-gradient(135deg, #6BAEEA, #4A90D9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    letter-spacing: 2px;
  }
  .success-amount {
    font-size: 38px; font-weight: 800;
    color: #3a5a7a;
    margin-bottom: 6px;
  }
  .success-trade-no {
    font-size: 12px; color: rgba(74,144,217,0.4);
    margin-bottom: 24px;
    word-break: break-all;
    line-height: 1.5;
  }
  .success-payer {
    font-size: 13px; color: rgba(74,144,217,0.5);
    margin-bottom: 28px;
  }
  .new-pay-btn {
    background: linear-gradient(135deg, #4A90D9 0%, #2E78C8 50%, #4A90D9 100%);
    background-size: 200% 100%;
    color: #eef5fc; border: none;
    border-radius: 14px;
    padding: 15px 44px;
    font-size: 15px; font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 2px;
    box-shadow: 0 8px 32px rgba(74,144,217,0.25);
    transition: all 0.3s;
  }
  .new-pay-btn:hover {
    background-position: 100% 0;
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(74,144,217,0.35);
  }

  /* ===== 测试模式提示 ===== */
  .test-mode-bar {
    display: none;
    background: linear-gradient(90deg, rgba(74,144,217,0.12), rgba(74,144,217,0.05));
    border: 1px solid rgba(74,144,217,0.25);
    border-radius: 10px;
    padding: 10px 16px;
    margin: 0 24px 0;
    font-size: 12px;
    color: #4A90D9;
    text-align: center;
    line-height: 1.5;
  }
  .test-mode-bar.show { display: block; }

  /* ===== 支付宝接口错误弹窗 ===== */
  .alipay-error-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(74,144,217,0.25);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  .alipay-error-overlay.show { display: flex; }
  .alipay-error-card {
    background: linear-gradient(145deg, #dde8f5, #4A90D9);
    border: 1px solid rgba(255,77,79,0.3);
    border-radius: 16px;
    padding: 24px 20px;
    max-width: 380px; width: 90%;
    color: #e0e0e0;
    text-align: center;
  }
  .alipay-error-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(255,77,79,0.15);
    color: #ff4d4f;
    font-size: 24px; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 12px;
  }
  .alipay-error-card h3 {
    color: #ff4d4f;
    font-size: 16px;
    margin: 0 0 16px;
  }
  .alipay-error-table {
    text-align: left;
    background: rgba(74,144,217,0.1);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 16px;
  }
  .ae-row {
    display: flex; justify-content: space-between;
    padding: 5px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(74,144,217,0.06);
  }
  .ae-row:last-child { border-bottom: none; }
  .ae-row span:first-child {
    color: #888;
    font-family: monospace;
    font-size: 12px;
  }
  .ae-row span:last-child {
    color: #ff4d4f;
    word-break: break-all;
    text-align: right;
    max-width: 220px;
  }
  .alipay-error-close {
    background: rgba(255,77,79,0.15);
    border: 1px solid rgba(255,77,79,0.3);
    color: #ff4d4f;
    padding: 8px 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
  }

  /* ===== SDK 错误弹窗（支付宝配置问题） ===== */
  .sdk-error-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(74,144,217,0.25);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  .sdk-error-overlay.show { display: flex; }
  .sdk-error-card {
    background: linear-gradient(145deg, #eef5fc, #dde8f5);
    border: 1px solid rgba(74,144,217,0.35);
    border-radius: 16px;
    padding: 28px 24px;
    max-width: 420px; width: 90%;
    color: #3a5a7a;
    text-align: center;
  }
  .sdk-error-icon {
    font-size: 42px;
    margin-bottom: 12px;
    color: #4A90D9;
  }
  .sdk-error-card h3 {
    color: #6BAEEA;
    font-size: 17px;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .sdk-error-card p {
    font-size: 13px;
    line-height: 1.7;
    color: rgba(224,216,200,0.8);
    margin-bottom: 8px;
    text-align: left;
  }
  .sdk-error-card .sdk-error-msg {
    background: rgba(255,77,79,0.08);
    border: 1px solid rgba(255,77,79,0.25);
    border-radius: 8px;
    padding: 12px 14px;
    margin: 12px 0;
    font-size: 12px;
    color: #ef9a9a;
    text-align: left;
    line-height: 1.6;
    word-break: break-all;
  }
  .sdk-error-close {
    background: rgba(74,144,217,0.1);
    border: 1px solid rgba(74,144,217,0.35);
    color: #4A90D9;
    padding: 9px 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-top: 6px;
    transition: all 0.2s;
  }
  .sdk-error-close:hover {
    background: rgba(74,144,217,0.2);
    border-color: #4A90D9;
  }

  /* ===== 错误提示 ===== */
  .error-toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #ff4d4f, #cf1322);
    color: #ffffff;
    padding: 14px 28px;
    border-radius: 14px;
    font-size: 14px; font-weight: 600;
    box-shadow: 0 8px 32px rgba(255,77,79,0.35);
    z-index: 999;
    animation: toastSlide 0.35s ease;
    display: none;
    letter-spacing: 0.5px;
  }
  .error-toast.show { display: block; }
  @keyframes toastSlide {
    from { opacity:0; transform: translateX(-50%) translateY(-20px); }
    to   { opacity:1; transform: translateX(-50%) translateY(0); }
  }

  /* ===== 加载动画 ===== */
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(74,144,217,0.15);
    border-top-color: #4A90D9;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== 响应式 ===== */
  @media (max-width: 480px) {
    body { padding: 8px; }
    .cashier-card {
      border-radius: 18px;
      max-width: 100%;
    }
    .amount-input { font-size: 36px; width: 170px; }
    .amount-yen { font-size: 28px; }
    .merchant-header { padding: 22px 20px 16px; }
    .merchant-header.compact { padding: 10px 16px 8px; }
    .merchant-header.compact .logo-wrap { width: 32px; height: 32px; margin-bottom: 4px; }

<body>

    </div>

<script>
// ==================== 配置 ====================
const API_BASE = '';

// ==================== 状态 ====================
let currentOutTradeNo = '';
let pollingTimer = null;
let lastAmount = '';
let lastSubject = '';
let lastQrImage = '';
const CATEGORY_LIST = ['游戏充值','百货家居','服装批发','五金器械','软件定制服务'];
let currentCategoryIndex = 0;
let currentCategory = CATEGORY_LIST[0];
let limitConfig = {};  // 从 /api/limits 拉取的限额配置
let mgrConfig = { enabled: true, mgrMinAmount: null, mgrMaxAmount: null };  // 从 /api/config 拉取的管理系统配置

// ==================== 商品类型自动轮换 ====================
function rotateCategory() {
  currentCategoryIndex = (currentCategoryIndex + 1) % CATEGORY_LIST.length;
  currentCategory = CATEGORY_LIST[currentCategoryIndex];
}
// ==================== 生成收款码 ====================
async function createQRCode() {
  // 每次生成前先拉取最新限额配置，确保后台修改能实时同步到收银台
  await fetchLimitConfig();
  await fetchMgrConfig();

  // 商户收款开关检查
  if (!mgrConfig.enabled) {
    showError('该商户已关闭收款功能，请联系管理员开启');
    return;
  }

  const amount = document.getElementById('amountInput').value.trim();
  const subject = currentCategory;

  if (!amount || parseFloat(amount) <= 0) {
    showError('请输入有效金额');
    return;
  }
  if (parseFloat(amount) > 100000) {
    showError('单次收款金额不能超过 ¥100,000');
    return;
  }

  // 限额校验：管理系统限额优先于收款后台限额
  const _amt = parseFloat(amount);
  const _localMin = limitConfig.minAmount !== '' && limitConfig.minAmount !== null && limitConfig.minAmount !== undefined ? parseFloat(limitConfig.minAmount) : null;
  const _localMax = limitConfig.maxAmount !== '' && limitConfig.maxAmount !== null && limitConfig.maxAmount !== undefined ? parseFloat(limitConfig.maxAmount) : null;
  const _mgrMin = mgrConfig.mgrMinAmount !== null && mgrConfig.mgrMinAmount !== undefined ? parseFloat(mgrConfig.mgrMinAmount) : null;
  const _mgrMax = mgrConfig.mgrMaxAmount !== null && mgrConfig.mgrMaxAmount !== undefined ? parseFloat(mgrConfig.mgrMaxAmount) : null;
  // 合并：两个都设置时取更严格的值
  const _min = (_mgrMin !== null && _localMin !== null) ? Math.max(_mgrMin, _localMin) : (_mgrMin !== null ? _mgrMin : _localMin);
  const _max = (_mgrMax !== null && _localMax !== null) ? Math.min(_mgrMax, _localMax) : (_mgrMax !== null ? _mgrMax : _localMax);
  if (_min !== null && !isNaN(_min) && _amt < _min) {
    showError(`最低支付金额为 ¥${_min.toFixed(2)}，请重新输入`);
    return;
  }
  if (_max !== null && !isNaN(_max) && _amt > _max) {
    showError(`最高支付金额为 ¥${_max.toFixed(2)}，请重新输入`);
    return;
  }

  const payBtn = document.getElementById('payBtn');
  payBtn.disabled = true;
  payBtn.textContent = '生成中...';

  lastAmount = amount;
  lastSubject = subject;

  try {
    const res = await fetch(`${API_BASE}cashier/qrcode`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount, subject })
    });
    const data = await res.json();

    if (data.code === 'OK') {
      currentOutTradeNo = data.out_trade_no;
      lastQrImage = data.qr_image || '';
      showQRCode(data);
      startPolling();
      rotateCategory();
    } else if (data.code === 'ALIPAY_ERROR') {
      showAlipayError(data.alipay_code, data.alipay_sub_code, data.alipay_sub_msg, data.alipay_msg);
      payBtn.disabled = false;
      payBtn.textContent = '生成收款码';
    } else if (data.code === 'SDK_ERROR') {
      showSdkError(data.message || '支付宝 SDK 未初始化');
      payBtn.disabled = false;
      payBtn.textContent = '生成收款码';
    } else {
      showError(data.message || '生成收款码失败');
      payBtn.disabled = false;
      payBtn.textContent = '生成收款码';
    }
  } catch (err) {
    showError('网络错误：' + err.message);
    payBtn.disabled = false;
    payBtn.textContent = '生成收款码';
  }
}

// ==================== 显示二维码 ====================
function showQRCode(data) {
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('btnSection').style.display = 'none';
  document.getElementById('paySection').classList.add('show');

  // 紧凑头部
  document.querySelector('.merchant-header').classList.add('compact');

  document.getElementById('payTitle').textContent = '请扫码支付';
  document.getElementById('paySubtitle').textContent = '打开支付宝扫一扫完成支付';
  document.getElementById('payAmount').textContent = `¥${parseFloat(data.amount).toFixed(2)}`;
  document.getElementById('paySubject').textContent = data.subject;

  const qrBox = document.querySelector('#paySection .qr-box');
  if (lastQrImage) {
    qrBox.innerHTML = `<img src="${lastQrImage}" alt="收款码" class="qr-img">`;
    qrBox.style.background = '#fff';
    qrBox.style.borderColor = 'rgba(74,144,217,0.3)';
  }

  document.getElementById('payTip').innerHTML = '<span class="dot"></span> 等待扫码支付...';
  document.getElementById('payTip').className = 'qr-tip';

  document.querySelector('#paySection .btn-group').innerHTML = `
    <button class="download-btn" onclick="downloadQR()" title="下载收款码">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      下载收款码
    </button>
    <button class="cancel-btn" onclick="resetToInput()">取消</button>
  `;
}

// ==================== 下载收款码 ====================
function downloadQR() {
  if (!lastQrImage) return;
  const a = document.createElement('a');
  a.href = lastQrImage;
  a.download = `收款码_¥${parseFloat(lastAmount).toFixed(2)}_${lastSubject}.png`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ==================== 轮询支付状态 ====================
function startPolling() {
  if (pollingTimer) clearInterval(pollingTimer);
  let pollCount = 0;
  const maxPolls = 900;

  pollingTimer = setInterval(async () => {
    pollCount++;
    if (pollCount > maxPolls) {
      clearInterval(pollingTimer);
      showError('支付超时，请重新发起');
      setTimeout(resetToInput, 2000);
      return;
    }

    try {
      const res = await fetch(`${API_BASE}cashier/check?out_trade_no=${currentOutTradeNo}`);
      const data = await res.json();
      if (data.status === 'paid') {
        clearInterval(pollingTimer);
        showSuccess(data);
      }
    } catch (e) {}
  }, 2000);
}

// ==================== 支付成功 ====================
function showSuccess(data) {
  document.getElementById('paySection').classList.remove('show');
  document.getElementById('successSection').classList.add('show');
  document.querySelector('.merchant-header').classList.remove('compact');

  document.getElementById('successAmount').textContent = `¥${parseFloat(lastAmount).toFixed(2)}`;
  document.getElementById('successTradeNo').textContent = `交易号: ${data.trade_no}`;
  if (data.payer) {
    document.getElementById('successPayer').textContent = `付款方: ${data.payer}`;
  }
}

// ==================== 重置到输入状态 ====================
function resetToInput() {
  if (pollingTimer) clearInterval(pollingTimer);
  currentOutTradeNo = '';
  lastQrImage = '';

  document.getElementById('paySection').classList.remove('show');
  document.getElementById('successSection').classList.remove('show');
  document.getElementById('inputSection').style.display = '';
  document.getElementById('btnSection').style.display = '';

  // 恢复头部
  document.querySelector('.merchant-header').classList.remove('compact');

  document.getElementById('payBtn').disabled = false;
  document.getElementById('payBtn').textContent = '生成收款码';

  document.getElementById('amountInput').value = '';
  document.getElementById('amountInput').focus();
}

// ==================== 错误提示 ====================
function showError(msg) {
  const toast = document.getElementById('errorToast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3500);
}

// ==================== 显示支付宝 API 真实错误 ====================
function showAlipayError(code, subCode, subMsg, msg) {
  document.getElementById('aeCode').textContent = code || '—';
  document.getElementById('aeSubCode').textContent = subCode || '—';
  document.getElementById('aeSubMsg').textContent = subMsg || '—';
  document.getElementById('aeMsg').textContent = msg || '—';
  document.getElementById('alipayErrorOverlay').classList.add('show');
}
function closeAlipayError() {
  document.getElementById('alipayErrorOverlay').classList.remove('show');
}

// SDK 错误弹窗
function showSdkError(msg) {
  document.getElementById('sdkErrorMessage').textContent = msg || '未知错误';
  document.getElementById('sdkErrorOverlay').classList.add('show');
}
function closeSdkError() {
  document.getElementById('sdkErrorOverlay').classList.remove('show');
}

// ==================== 金额步进 ====================
function stepAmount(delta) {
  const input = document.getElementById('amountInput');
  let val = parseFloat(input.value) || 0;
  val = Math.round((val + delta) * 100) / 100;
  if (val < 0.01) val = 0.01;
  if (val > 100000) val = 100000;
  input.value = val.toFixed(2);
  input.focus();
}


/* 金额步进按钮长按连续调整 */
(function() {
  var activeTimer = null;
  var activeInterval = null;
  var lastDelta = 0;

  function doStep(delta) {
    var input = document.getElementById('amountInput');
    if (!input) return;
    var val = parseFloat(input.value) || 0;
    val = Math.round((val + delta) * 100) / 100;
    if (val < 0.01) val = 0.01;
    if (val > 100000) val = 100000;
    input.value = val.toFixed(2);
  }

  function startPress(delta) {
    doStep(delta);
  }

  function stopPress() {
    clearTimeout(activeTimer);
    clearInterval(activeInterval);
    activeTimer = null;
    activeInterval = null;
  }

  // 事件委托
  document.addEventListener('mousedown', function(e) {
    var btn = e.target.closest('.step-up, .step-down');
    if (!btn) return;
    e.preventDefault();
    startPress(parseFloat(btn.getAttribute('data-delta')));
  }, true);

  document.addEventListener('touchstart', function(e) {
    var btn = e.target.closest('.step-up, .step-down');
    if (!btn) return;
    e.preventDefault(); // 阻止浏览器合成 mousedown 事件，避免重复触发
    startPress(parseFloat(btn.getAttribute('data-delta')));
  }, { passive: false, capture: true });

  function stopHandler() { stopPress(); }
  document.addEventListener('mouseup', stopHandler, true);
  document.addEventListener('touchend', stopHandler, true);
  document.addEventListener('touchcancel', stopHandler, true);
})();

// ==================== 快捷键 ====================
document.getElementById('amountInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    createQRCode();
  }
});

// ==================== 拉取限额配置 ====================
async function fetchLimitConfig() {
  try {
    const res = await fetch('api/limits');
    const data = await res.json();
    if (data.success) {
      limitConfig = data.data || data.config || {};
    }
  } catch (e) {}
}

// 页面加载时拉取一次限额配置
fetchLimitConfig();

// ==================== 拉取管理系统配置（开关+限额） ====================
async function fetchMgrConfig() {
  try {
    const res = await fetch('api/config');
    const data = await res.json();
    if (data.code === 'OK' && data.data) {
      mgrConfig.enabled = data.data.enabled !== false;
      mgrConfig.mgrMinAmount = data.data.mgrMinAmount !== undefined ? data.data.mgrMinAmount : null;
      mgrConfig.mgrMaxAmount = data.data.mgrMaxAmount !== undefined ? data.data.mgrMaxAmount : null;
    }
  } catch (e) {}
}
fetchMgrConfig();

</script>
